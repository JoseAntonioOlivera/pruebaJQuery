<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mis Tareas con jQuery</title>
    <style>
        .completada {
            text-decoration: line-through;
            color: gray;
        }

        li {
            cursor: pointer;
            margin: 5px 0;
            padding: 5px;
            background: #f4f4f4;
        }
    </style>
    <!-- 1. Aquí se debe añadir el CDN de jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

    <h1>Gestor de Tareas</h1>

    <input type="text" id="nuevaTarea" placeholder="Escribe una tarea...">
    <button id="btnAnadir">Anadir Tarea</button>
    <button id="btnLimpiar">Ocultar Completadas</button>

    <ul id="listaTareas">
        <li>Comprar pan</li>
        <li>Estudiar jQuery</li>
    </ul>

    <script>
        $(document).ready(function () {
            $("#btnAnadir").click(function () {
                clickTarea();
            });

            meteEvento();

            $("#btnLimpiar").click(function () {
                $(".completada").fadeOut("slow");
            });

        });

        function clickTarea() {
            let valor = $("#nuevaTarea").val();
            if (valor !== "") {
                $("#listaTareas").append("<li>" + valor + "</li>");
                $("#nuevaTarea").val("");
                meteEvento();
            }
        }

        function meteEvento(){
            $("li").click(function () {
                $(this).toggleClass("completada");
            });
        }

    </script>
</body>

</html>
